name: Build Supreme Bot APK

on:
  push:
    branches:
      - main
      - claude/supreme-pred-v2-engine-UiUx4
    paths:
      - 'bot-android/android/**'
      - 'candle_V12_SUPREME.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > bot-android/android/local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x bot-android/android/gradlew

      - name: Build Debug APK
        working-directory: bot-android/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Verify APK exists
        run: |
          APK=bot-android/android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh "$APK"
          echo "✅ APK ready: $(du -sh $APK | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SupremeBot-debug
          path: bot-android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
