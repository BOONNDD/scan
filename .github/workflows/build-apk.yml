name: Build Supreme Bot APK

on:
  push:
    branches:
      - claude/supreme-pred-v2-engine-UiUx4
    paths:
      - 'bot-android/android/**'
  workflow_dispatch:   # زر يدوي من GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x bot-android/android/gradlew
        continue-on-error: true

      - name: Build Debug APK
        working-directory: bot-android/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SupremeBot-debug
          path: bot-android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          APK=bot-android/android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ APK built successfully"
          echo "📦 Size: $(du -sh $APK | cut -f1)"
