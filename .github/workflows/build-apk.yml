name: Build Supreme Bot APK

on:
  push:
    branches:
      - main
      - claude/supreme-pred-v2-engine-UiUx4
    paths:
      - 'bot-android/android/**'
      - 'candle_V12_SUPREME.js'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > bot-android/android/local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x bot-android/android/gradlew

      - name: Build Debug APK
        working-directory: bot-android/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Surface actual error on failure
        if: failure()
        working-directory: bot-android/android
        run: |
          if [ ! -f build.log ]; then
            echo "build.log not found — Gradle build never started"
            exit 0
          fi
          echo "==================== FIRST 80 LINES ===================="
          head -n 80 build.log
          echo ""
          echo "==================== KOTLIN / AAPT ERRORS ===================="
          grep -n -E "^e:|^error:|error: resource|ERROR:" build.log || echo "(no error lines found)"
          echo ""
          echo "==================== TASK FAILURES ===================="
          grep -n "FAILED\|What went wrong\|Caused by:" build.log | head -40 || echo "(no task failures)"
          echo ""
          echo "==================== LAST 150 LINES ===================="
          tail -n 150 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: bot-android/android/build.log
          retention-days: 7

      - name: Show build output directory
        if: always()
        run: |
          echo "=== Build output ==="
          find bot-android/android/app/build -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== Build dir exists? ==="
          ls bot-android/android/app/build/outputs/ 2>/dev/null || echo "outputs dir missing"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SupremeBot-debug
          path: bot-android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
